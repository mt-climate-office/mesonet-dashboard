<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Montana Mesonet Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // GitHub Pages serves this file with a 404 status when no static asset
      // matches the requested path. We translate `/mesonet-dashboard/<id>`
      // into `/mesonet-dashboard/?s=<id>` so deep links from the legacy app
      // resolve to the rebuilt dashboard.
      (function () {
        var base = '/mesonet-dashboard'
        var path = window.location.pathname
        if (path.indexOf(base + '/') !== 0) {
          window.location.replace(base + '/' + window.location.search + window.location.hash)
          return
        }
        var sub = path.slice(base.length + 1).replace(/\/+$/, '')
        if (!sub || sub.indexOf('/') !== -1 || !/^[a-z0-9_-]+$/i.test(sub)) {
          window.location.replace(base + '/' + window.location.search + window.location.hash)
          return
        }
        var search = window.location.search
        if (search.indexOf('s=') === -1) {
          search = search ? search + '&s=' + sub : '?s=' + sub
        }
        window.location.replace(base + '/' + search + window.location.hash)
      })()
    </script>
  </head>
  <body>
    <noscript>
      JavaScript is required to load the Montana Mesonet Dashboard. Please
      enable it or visit the
      <a href="https://mesonet.climate.umt.edu/dash/">legacy dashboard</a>.
    </noscript>
  </body>
</html>
